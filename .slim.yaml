# docker-slim 配置文件
# 用于优化和压缩 Docker 镜像

# 目标镜像
targets:
  - image: ghcr.io/cafe9k/riemann-stock
    tag: latest

# 优化选项
options:
  # 包含 Node.js 运行时必需的文件
  include:
    - /app/backend/server.js
    - /app/backend/node_modules
    - /app/frontend
    - /usr/local/bin/node

  # 排除不需要的文件
  exclude:
    - "**/*.md"
    - "**/test"
    - "**/tests"
    - "**/.git"
    - "**/node_modules/.cache"

  # 保留环境变量
  keep-env:
    - PORT
    - NODE_ENV
    - AKTOOLS_URL
    - AKTOOLS_USERNAME
    - AKTOOLS_PASSWORD

  # 健康检查探测
  probe:
    http:
      port: 3000
      path: /
      timeout: 10s

# 输出标签
tags:
  - latest-slim
  - "{{.Image.Name}}:{{.Image.Tag}}-slim"
