<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKTools 股票数据查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 20px;
        }

        /* 标签页样式 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: #f8f9fa;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .status {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .positive {
            color: #d32f2f;
        }

        .negative {
            color: #388e3c;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 300px;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        .api-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 13px;
            color: #555;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge.get {
            background: #e3f2fd;
            color: #1976d2;
        }

        .server-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .server-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .server-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .highlight {
            background: #fff3cd;
            padding: 2px 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>
                📊 AKTools 股票数据查看器
                <span id="serverStatus" class="server-status">检查中...</span>
            </h1>
            
            <!-- 标签页导航 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('stock')">📈 实时行情</button>
                <button class="tab" onclick="switchTab('lhb')">🐉 龙虎榜</button>
            </div>

            <!-- 服务状态 -->
            <div class="config-section">
                <div>
                    <h2>服务状态</h2>
                    <div class="api-info" id="apiInfo">
                        正在检查服务状态...
                    </div>
                </div>
                <div>
                    <h2>数据来源</h2>
                    <div class="api-info">
                        <strong>数据源:</strong> AKTools API<br>
                        <strong>代理服务:</strong> 本地代理<br>
                        <strong>返回格式:</strong> JSON
                    </div>
                </div>
            </div>
        </div>

        <!-- 实时行情标签页 -->
        <div id="stockTab" class="tab-content active">
            <div class="card">
                <h2>沪深京 A 股实时行情</h2>
                <div style="margin-bottom: 20px;">
                    <button class="btn" onclick="fetchStockData()">🚀 获取股票数据</button>
                    <button class="btn btn-secondary" onclick="clearStockData()">🗑️ 清空数据</button>
                </div>
                <div id="stockStatus" class="status"></div>
            </div>

            <div class="card" id="stockResultCard" style="display: none;">
                <h2>📈 数据统计</h2>
                <div class="stats" id="stockStats"></div>
                
                <div class="search-box">
                    <input type="text" id="stockSearchInput" placeholder="🔍 搜索股票代码或名称..." onkeyup="filterStockTable()">
                </div>
                
                <div class="table-wrapper">
                    <div id="stockLoading" class="loading" style="display: none;">正在加载数据</div>
                    <div class="table-container">
                        <table id="stockTable">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>代码</th>
                                    <th>名称</th>
                                    <th>最新价</th>
                                    <th>涨跌额</th>
                                    <th>涨跌幅</th>
                                    <th>买入</th>
                                    <th>卖出</th>
                                    <th>昨收</th>
                                    <th>今开</th>
                                    <th>最高</th>
                                    <th>最低</th>
                                    <th>成交量(股)</th>
                                    <th>成交额(元)</th>
                                </tr>
                            </thead>
                            <tbody id="stockBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 龙虎榜标签页 -->
        <div id="lhbTab" class="tab-content">
            <div class="card">
                <h2>龙虎榜数据查询</h2>
                
                <div class="form-group">
                    <label>查询类型:</label>
                    <select id="lhbType" onchange="updateLhbParams()">
                        <option value="stock_lhb_detail_em">龙虎榜详情</option>
                        <option value="stock_lhb_stock_statistic_em">龙虎榜个股统计</option>
                        <option value="stock_lhb_stock_detail_em">龙虎榜个股详情</option>
                    </select>
                </div>

                <div id="lhbParams">
                    <div class="form-group">
                        <label>交易日:</label>
                        <input type="date" id="lhbDate">
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button class="btn" onclick="fetchLhbData()">🚀 获取龙虎榜数据</button>
                    <button class="btn btn-secondary" onclick="clearLhbData()">🗑️ 清空数据</button>
                </div>

                <div id="lhbStatus" class="status"></div>
            </div>

            <div class="card" id="lhbResultCard" style="display: none;">
                <h2>🐉 龙虎榜数据</h2>
                <div class="stats" id="lhbStats"></div>
                
                <div class="search-box">
                    <input type="text" id="lhbSearchInput" placeholder="🔍 搜索股票代码或名称..." onkeyup="filterLhbTable()">
                </div>
                
                <div class="table-wrapper">
                    <div id="lhbLoading" class="loading" style="display: none;">正在加载数据</div>
                    <div class="table-container">
                        <table id="lhbTable">
                            <thead id="lhbTableHead"></thead>
                            <tbody id="lhbBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allStocks = [];
        let allLhb = [];
        
        // 页面加载时初始化
        window.onload = async function() {
            await checkServerHealth();
            initDatePickers();
        };

        // 初始化日期选择器
        function initDatePickers() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('lhbDate').value = today;
        }

        // 检查服务状态
        async function checkServerHealth() {
            const statusEl = document.getElementById('serverStatus');
            const apiInfoEl = document.getElementById('apiInfo');
            
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    statusEl.textContent = '已连接';
                    statusEl.className = 'server-status connected';
                    
                    apiInfoEl.innerHTML = `
                        <strong>✅ 代理服务运行正常</strong><br>
                        <strong>AKTools 地址:</strong> ${data.aktools_url}<br>
                        <strong>服务时间:</strong> ${data.timestamp}
                    `;
                } else {
                    throw new Error('服务状态异常');
                }
            } catch (error) {
                statusEl.textContent = '连接失败';
                statusEl.className = 'server-status error';
                
                apiInfoEl.innerHTML = `
                    <strong>❌ 代理服务连接失败</strong><br>
                    <strong>错误信息:</strong> ${error.message}
                `;
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            // 移除所有 active 类
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // 添加 active 类到当前标签页
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // ==================== 实时行情功能 ====================
        
        async function fetchStockData() {
            const loading = document.getElementById('stockLoading');
            const resultCard = document.getElementById('stockResultCard');
            const status = document.getElementById('stockStatus');
            
            loading.style.display = 'block';
            resultCard.style.display = 'block';
            status.className = 'status info';
            status.textContent = '⏳ 正在请求 API...';
            
            try {
                const response = await fetch('/api/stock_zh_a_spot');
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    allStocks = data;
                } else if (data.data && Array.isArray(data.data)) {
                    allStocks = data.data;
                } else {
                    allStocks = [data];
                }
                
                displayStockStats(allStocks);
                renderStockTable(allStocks);
                
                showStatus('stockStatus', `✅ 成功获取 ${allStocks.length} 条股票数据`, 'success');
                
            } catch (error) {
                console.error('请求失败:', error);
                showStatus('stockStatus', `❌ 请求失败: ${error.message}`, 'error');
                loading.style.display = 'none';
            }
        }

        function displayStockStats(stocks) {
            const statsDiv = document.getElementById('stockStats');
            
            if (!stocks || stocks.length === 0) {
                statsDiv.innerHTML = '<p>暂无数据</p>';
                return;
            }
            
            const total = stocks.length;
            const up = stocks.filter(s => parseFloat(s.涨跌幅 || s.change_percent || 0) > 0).length;
            const down = stocks.filter(s => parseFloat(s.涨跌幅 || s.change_percent || 0) < 0).length;
            const flat = total - up - down;
            
            statsDiv.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">总股票数</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <div class="stat-value">${up}</div>
                    <div class="stat-label">上涨股票</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                    <div class="stat-value">${down}</div>
                    <div class="stat-label">下跌股票</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">
                    <div class="stat-value">${flat}</div>
                    <div class="stat-label">平盘股票</div>
                </div>
            `;
        }

        function renderStockTable(stocks) {
            const tbody = document.getElementById('stockBody');
            const loading = document.getElementById('stockLoading');
            
            loading.style.display = 'none';
            
            if (!stocks || stocks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="14" style="text-align: center;">暂无数据</td></tr>';
                return;
            }
            
            const getFieldValue = (item, fields) => {
                for (let field of fields) {
                    if (item[field] !== undefined) return item[field];
                }
                return '-';
            };
            
            tbody.innerHTML = stocks.map((stock, index) => {
                const changePercent = parseFloat(getFieldValue(stock, ['涨跌幅', 'change_percent', 'chg_pct']) || 0);
                const changeClass = changePercent > 0 ? 'positive' : (changePercent < 0 ? 'negative' : '');
                
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${getFieldValue(stock, ['代码', 'code', 'symbol'])}</strong></td>
                        <td>${getFieldValue(stock, ['名称', 'name', 'stock_name'])}</td>
                        <td>${getFieldValue(stock, ['最新价', 'price', 'current_price'])}</td>
                        <td class="${changeClass}">${getFieldValue(stock, ['涨跌额', 'change', 'chg'])}</td>
                        <td class="${changeClass}">${getFieldValue(stock, ['涨跌幅', 'change_percent', 'chg_pct'])}%</td>
                        <td>${getFieldValue(stock, ['买入', 'buy', 'bid'])}</td>
                        <td>${getFieldValue(stock, ['卖出', 'sell', 'ask'])}</td>
                        <td>${getFieldValue(stock, ['昨收', 'pre_close', 'last_close'])}</td>
                        <td>${getFieldValue(stock, ['今开', 'open', 'open_price'])}</td>
                        <td>${getFieldValue(stock, ['最高', 'high', 'max_price'])}</td>
                        <td>${getFieldValue(stock, ['最低', 'low', 'min_price'])}</td>
                        <td>${formatNumber(getFieldValue(stock, ['成交量', 'volume', 'vol']))}</td>
                        <td>${formatNumber(getFieldValue(stock, ['成交额', 'amount', 'turnover']))}</td>
                    </tr>
                `;
            }).join('');
        }

        function filterStockTable() {
            const searchTerm = document.getElementById('stockSearchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderStockTable(allStocks);
                return;
            }
            
            const filtered = allStocks.filter(stock => {
                const code = (stock.代码 || stock.code || stock.symbol || '').toLowerCase();
                const name = (stock.名称 || stock.name || stock.stock_name || '').toLowerCase();
                return code.includes(searchTerm) || name.includes(searchTerm);
            });
            
            renderStockTable(filtered);
        }

        function clearStockData() {
            allStocks = [];
            document.getElementById('stockBody').innerHTML = '';
            document.getElementById('stockResultCard').style.display = 'none';
            document.getElementById('stockStatus').className = 'status';
            document.getElementById('stockStatus').textContent = '';
        }

        // ==================== 龙虎榜功能 ====================

        function updateLhbParams() {
            const type = document.getElementById('lhbType').value;
            const paramsDiv = document.getElementById('lhbParams');
            
            // 根据不同类型显示不同参数
            if (type === 'stock_lhb_detail_em') {
                paramsDiv.innerHTML = `
                    <div class="form-group">
                        <label>交易日:</label>
                        <input type="date" id="lhbDate">
                    </div>
                `;
            } else if (type === 'stock_lhb_stock_statistic_em') {
                paramsDiv.innerHTML = `
                    <div class="form-group">
                        <label>开始日期:</label>
                        <input type="date" id="lhbStartDate">
                    </div>
                    <div class="form-group">
                        <label>结束日期:</label>
                        <input type="date" id="lhbEndDate">
                    </div>
                `;
            } else if (type === 'stock_lhb_stock_detail_em') {
                paramsDiv.innerHTML = `
                    <div class="form-group">
                        <label>股票代码:</label>
                        <input type="text" id="lhbSymbol" placeholder="例如: 000001">
                    </div>
                    <div class="form-group">
                        <label>开始日期:</label>
                        <input type="date" id="lhbStartDate">
                    </div>
                    <div class="form-group">
                        <label>结束日期:</label>
                        <input type="date" id="lhbEndDate">
                    </div>
                `;
            }
            
            initDatePickers();
        }

        async function fetchLhbData() {
            const loading = document.getElementById('lhbLoading');
            const resultCard = document.getElementById('lhbResultCard');
            const status = document.getElementById('lhbStatus');
            const type = document.getElementById('lhbType').value;
            
            loading.style.display = 'block';
            resultCard.style.display = 'block';
            status.className = 'status info';
            status.textContent = '⏳ 正在请求龙虎榜数据...';
            
            try {
                // 构建请求参数
                let params = new URLSearchParams();
                
                if (type === 'stock_lhb_detail_em') {
                    const date = document.getElementById('lhbDate').value;
                    if (date) params.append('trade_date', date.replace(/-/g, ''));
                } else if (type === 'stock_lhb_stock_statistic_em') {
                    const startDate = document.getElementById('lhbStartDate')?.value;
                    const endDate = document.getElementById('lhbEndDate')?.value;
                    if (startDate) params.append('start_date', startDate.replace(/-/g, ''));
                    if (endDate) params.append('end_date', endDate.replace(/-/g, ''));
                } else if (type === 'stock_lhb_stock_detail_em') {
                    const symbol = document.getElementById('lhbSymbol')?.value;
                    const startDate = document.getElementById('lhbStartDate')?.value;
                    const endDate = document.getElementById('lhbEndDate')?.value;
                    if (symbol) params.append('symbol', symbol);
                    if (startDate) params.append('start_date', startDate.replace(/-/g, ''));
                    if (endDate) params.append('end_date', endDate.replace(/-/g, ''));
                }
                
                const response = await fetch(`/api/${type}?${params.toString()}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    allLhb = data;
                } else if (data.data && Array.isArray(data.data)) {
                    allLhb = data.data;
                } else {
                    allLhb = [data];
                }
                
                displayLhbStats(allLhb);
                renderLhbTable(allLhb);
                
                showStatus('lhbStatus', `✅ 成功获取 ${allLhb.length} 条龙虎榜数据`, 'success');
                
            } catch (error) {
                console.error('请求失败:', error);
                showStatus('lhbStatus', `❌ 请求失败: ${error.message}`, 'error');
                loading.style.display = 'none';
            }
        }

        function displayLhbStats(data) {
            const statsDiv = document.getElementById('lhbStats');
            
            if (!data || data.length === 0) {
                statsDiv.innerHTML = '<p>暂无数据</p>';
                return;
            }
            
            statsDiv.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${data.length}</div>
                    <div class="stat-label">总记录数</div>
                </div>
            `;
        }

        function renderLhbTable(data) {
            const thead = document.getElementById('lhbTableHead');
            const tbody = document.getElementById('lhbBody');
            const loading = document.getElementById('lhbLoading');
            
            loading.style.display = 'none';
            
            if (!data || data.length === 0) {
                thead.innerHTML = '';
                tbody.innerHTML = '<tr><td style="text-align: center;">暂无数据</td></tr>';
                return;
            }
            
            // 动态生成表头
            const headers = Object.keys(data[0]);
            thead.innerHTML = `
                <tr>
                    <th>序号</th>
                    ${headers.map(h => `<th>${h}</th>`).join('')}
                </tr>
            `;
            
            // 渲染数据行
            tbody.innerHTML = data.map((item, index) => {
                return `
                    <tr>
                        <td>${index + 1}</td>
                        ${headers.map(h => {
                            const value = item[h];
                            // 格式化数值
                            if (typeof value === 'number') {
                                if (value > 100000000) {
                                    return `<td>${(value / 100000000).toFixed(2)}亿</td>`;
                                } else if (value > 10000) {
                                    return `<td>${(value / 10000).toFixed(2)}万</td>`;
                                }
                                return `<td>${value.toLocaleString()}</td>`;
                            }
                            return `<td>${value || '-'}</td>`;
                        }).join('')}
                    </tr>
                `;
            }).join('');
        }

        function filterLhbTable() {
            const searchTerm = document.getElementById('lhbSearchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderLhbTable(allLhb);
                return;
            }
            
            const filtered = allLhb.filter(item => {
                return Object.values(item).some(val => 
                    String(val).toLowerCase().includes(searchTerm)
                );
            });
            
            renderLhbTable(filtered);
        }

        function clearLhbData() {
            allLhb = [];
            document.getElementById('lhbTableHead').innerHTML = '';
            document.getElementById('lhbBody').innerHTML = '';
            document.getElementById('lhbResultCard').style.display = 'none';
            document.getElementById('lhbStatus').className = 'status';
            document.getElementById('lhbStatus').textContent = '';
        }

        // ==================== 工具函数 ====================

        function formatNumber(num) {
            if (!num || num === '-') return '-';
            const n = parseFloat(num);
            if (isNaN(n)) return num;
            
            if (n >= 100000000) {
                return (n / 100000000).toFixed(2) + '亿';
            } else if (n >= 10000) {
                return (n / 10000).toFixed(2) + '万';
            }
            return n.toLocaleString();
        }

        function showStatus(elementId, message, type) {
            const status = document.getElementById(elementId);
            status.textContent = message;
            status.className = `status ${type}`;
        }
    </script>
</body>
</html>
