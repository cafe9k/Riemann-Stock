<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKTools A股股票数据查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .status {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .positive {
            color: #d32f2f;
        }

        .negative {
            color: #388e3c;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 300px;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        .api-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 13px;
            color: #555;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge.get {
            background: #e3f2fd;
            color: #1976d2;
        }

        .server-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .server-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .server-status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📊 AKTools A股股票数据查看器 
                <span id="serverStatus" class="server-status">检查中...</span>
            </h1>
            <p style="color: #666; margin-bottom: 20px;">查看沪深京 A 股实时行情数据（通过代理服务访问 AKTools API）</p>
            
            <div class="config-section">
                <div>
                    <h2>服务状态</h2>
                    <div class="api-info" id="apiInfo">
                        正在检查服务状态...
                    </div>
                    <div style="margin-top: 20px;">
                        <button class="btn" onclick="fetchStockData()">🚀 获取股票数据</button>
                        <button class="btn btn-secondary" onclick="clearData()">🗑️ 清空数据</button>
                    </div>
                </div>
                <div>
                    <h2>接口信息</h2>
                    <div class="api-info">
                        <strong>接口路径:</strong> /api/stock_zh_a_spot <span class="badge get">GET</span><br>
                        <strong>接口描述:</strong> 获取沪深京 A 股实时行情数据<br>
                        <strong>参数要求:</strong> 无需参数<br>
                        <strong>数据来源:</strong> 新浪财经<br>
                        <strong>返回格式:</strong> JSON
                    </div>
                </div>
            </div>
            
            <div id="status" class="status"></div>
        </div>

        <div class="card" id="resultCard" style="display: none;">
            <h2>📈 数据统计</h2>
            <div class="stats" id="stats"></div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索股票代码或名称..." onkeyup="filterTable()">
            </div>
            
            <div class="table-wrapper">
                <div id="loading" class="loading" style="display: none;">正在加载数据</div>
                <div class="table-container">
                    <table id="stockTable">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>代码</th>
                                <th>名称</th>
                                <th>最新价</th>
                                <th>涨跌额</th>
                                <th>涨跌幅</th>
                                <th>买入</th>
                                <th>卖出</th>
                                <th>昨收</th>
                                <th>今开</th>
                                <th>最高</th>
                                <th>最低</th>
                                <th>成交量(股)</th>
                                <th>成交额(元)</th>
                                <th>时间戳</th>
                            </tr>
                        </thead>
                        <tbody id="stockBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allStocks = [];
        
        // 页面加载时检查服务状态
        window.onload = async function() {
            await checkServerHealth();
        };
        
        async function checkServerHealth() {
            const statusEl = document.getElementById('serverStatus');
            const apiInfoEl = document.getElementById('apiInfo');
            
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    statusEl.textContent = '已连接';
                    statusEl.className = 'server-status connected';
                    
                    apiInfoEl.innerHTML = `
                        <strong>✅ 代理服务运行正常</strong><br>
                        <strong>AKTools 地址:</strong> ${data.aktools_url}<br>
                        <strong>服务时间:</strong> ${data.timestamp}
                    `;
                } else {
                    throw new Error('服务状态异常');
                }
            } catch (error) {
                statusEl.textContent = '连接失败';
                statusEl.className = 'server-status error';
                
                apiInfoEl.innerHTML = `
                    <strong>❌ 代理服务连接失败</strong><br>
                    <strong>错误信息:</strong> ${error.message}<br>
                    <strong>请检查:</strong><br>
                    - 确认代理服务已启动<br>
                    - 检查 AKTools 服务是否可访问<br>
                    - 查看浏览器控制台获取详细错误
                `;
            }
        }
        
        async function fetchStockData() {
            // 显示加载状态
            const loading = document.getElementById('loading');
            const resultCard = document.getElementById('resultCard');
            const status = document.getElementById('status');
            
            loading.style.display = 'block';
            resultCard.style.display = 'block';
            status.className = 'status info';
            status.textContent = '⏳ 正在请求 API...';
            
            try {
                // 使用相对路径调用代理 API
                const response = await fetch('/api/stock_zh_a_spot', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('响应状态:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('返回数据:', data);
                
                // 处理数据
                if (Array.isArray(data)) {
                    allStocks = data;
                } else if (data.data && Array.isArray(data.data)) {
                    allStocks = data.data;
                } else {
                    allStocks = [data];
                }
                
                // 显示统计信息
                displayStats(allStocks);
                
                // 渲染表格
                renderTable(allStocks);
                
                showStatus(`✅ 成功获取 ${allStocks.length} 条股票数据`, 'success');
                
            } catch (error) {
                console.error('请求失败:', error);
                showStatus(`❌ 请求失败: ${error.message}`, 'error');
                loading.style.display = 'none';
            }
        }
        
        function displayStats(stocks) {
            const statsDiv = document.getElementById('stats');
            
            if (!stocks || stocks.length === 0) {
                statsDiv.innerHTML = '<p>暂无数据</p>';
                return;
            }
            
            const total = stocks.length;
            const up = stocks.filter(s => parseFloat(s.涨跌幅 || s.change_percent || 0) > 0).length;
            const down = stocks.filter(s => parseFloat(s.涨跌幅 || s.change_percent || 0) < 0).length;
            const flat = total - up - down;
            
            statsDiv.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">总股票数</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <div class="stat-value">${up}</div>
                    <div class="stat-label">上涨股票</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                    <div class="stat-value">${down}</div>
                    <div class="stat-label">下跌股票</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">
                    <div class="stat-value">${flat}</div>
                    <div class="stat-label">平盘股票</div>
                </div>
            `;
        }
        
        function renderTable(stocks) {
            const tbody = document.getElementById('stockBody');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'none';
            
            if (!stocks || stocks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="15" style="text-align: center;">暂无数据</td></tr>';
                return;
            }
            
            // 获取字段名（兼容不同的字段命名）
            const getFieldValue = (item, fields) => {
                for (let field of fields) {
                    if (item[field] !== undefined) {
                        return item[field];
                    }
                }
                return '-';
            };
            
            tbody.innerHTML = stocks.map((stock, index) => {
                const changePercent = parseFloat(getFieldValue(stock, ['涨跌幅', 'change_percent', 'chg_pct']) || 0);
                const changeClass = changePercent > 0 ? 'positive' : (changePercent < 0 ? 'negative' : '');
                
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${getFieldValue(stock, ['代码', 'code', 'symbol'])}</strong></td>
                        <td>${getFieldValue(stock, ['名称', 'name', 'stock_name'])}</td>
                        <td>${getFieldValue(stock, ['最新价', 'price', 'current_price'])}</td>
                        <td class="${changeClass}">${getFieldValue(stock, ['涨跌额', 'change', 'chg'])}</td>
                        <td class="${changeClass}">${getFieldValue(stock, ['涨跌幅', 'change_percent', 'chg_pct'])}%</td>
                        <td>${getFieldValue(stock, ['买入', 'buy', 'bid'])}</td>
                        <td>${getFieldValue(stock, ['卖出', 'sell', 'ask'])}</td>
                        <td>${getFieldValue(stock, ['昨收', 'pre_close', 'last_close'])}</td>
                        <td>${getFieldValue(stock, ['今开', 'open', 'open_price'])}</td>
                        <td>${getFieldValue(stock, ['最高', 'high', 'max_price'])}</td>
                        <td>${getFieldValue(stock, ['最低', 'low', 'min_price'])}</td>
                        <td>${formatNumber(getFieldValue(stock, ['成交量', 'volume', 'vol']))}</td>
                        <td>${formatNumber(getFieldValue(stock, ['成交额', 'amount', 'turnover']))}</td>
                        <td>${getFieldValue(stock, ['时间戳', 'time', 'timestamp'])}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function formatNumber(num) {
            if (!num || num === '-') return '-';
            const n = parseFloat(num);
            if (isNaN(n)) return num;
            
            if (n >= 100000000) {
                return (n / 100000000).toFixed(2) + '亿';
            } else if (n >= 10000) {
                return (n / 10000).toFixed(2) + '万';
            }
            return n.toLocaleString();
        }
        
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderTable(allStocks);
                return;
            }
            
            const filtered = allStocks.filter(stock => {
                const code = (stock.代码 || stock.code || stock.symbol || '').toLowerCase();
                const name = (stock.名称 || stock.name || stock.stock_name || '').toLowerCase();
                return code.includes(searchTerm) || name.includes(searchTerm);
            });
            
            renderTable(filtered);
        }
        
        function clearData() {
            allStocks = [];
            document.getElementById('stockBody').innerHTML = '';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('status').className = 'status';
            document.getElementById('status').textContent = '';
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }
    </script>
</body>
</html>
